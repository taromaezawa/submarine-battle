<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>submarine-battle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="room-join" style="text-align: center; padding: 40px;">
      <h1>⚓ submarine-battle</h1>
      <input type="text" id="room-code" placeholder="4-digit room code" maxlength="4">
      <input type="text" id="player-name" placeholder="Your name">
      <button onclick="joinRoom()">Join Game</button>
    </div>

    <div id="game" style="display: none;">
      <div id="deployment" style="display: none;">
        <h2>Deploy Fleet</h2>
        <p>Drag ships onto the grid</p>
        <div id="grid"></div>
        <button onclick="startGame()">Ready</button>
      </div>

      <div id="combat" style="display: none;">
        <h2>Attack Phase</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div>
            <h3>Your Fleet</h3>
            <div id="your-grid"></div>
          </div>
          <div>
            <h3>Enemy Fleet</h3>
            <div id="enemy-grid"></div>
          </div>
        </div>
        <div id="turn-timer">--</div>
        <div id="message"></div>
        <div id="chat-panel">
          <div id="chat-messages"></div>
          <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="メッセージを入力..." maxlength="140">
            <button id="chat-send">送信</button>
          </div>
        </div>
      </div>

      <div id="game-over" style="display: none;">
        <h2 id="game-result"></h2>
        <button onclick="location.reload()">Play Again</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
