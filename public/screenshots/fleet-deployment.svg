<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="800" fill="#f5f5f5"/>
  
  <!-- Title bar -->
  <rect width="1280" height="60" fill="#003366"/>
  <text x="640" y="40" font-size="24" font-weight="bold" fill="white" text-anchor="middle">⚓ submarine-battle</text>
  
  <!-- Content -->
  <g id="content">
    
  <rect x="50" y="100" width="600" height="600" fill="white" stroke="#333" stroke-width="2"/>
  <text x="350" y="90" font-size="20" font-weight="bold">Deploy Fleet (10×10)</text>
  
  <!-- Grid -->
  <line x1="50" y1="100" x2="50" y2="700" stroke="#ddd" stroke-width="1"/><line x1="110" y1="100" x2="110" y2="700" stroke="#ddd" stroke-width="1"/><line x1="170" y1="100" x2="170" y2="700" stroke="#ddd" stroke-width="1"/><line x1="230" y1="100" x2="230" y2="700" stroke="#ddd" stroke-width="1"/><line x1="290" y1="100" x2="290" y2="700" stroke="#ddd" stroke-width="1"/><line x1="350" y1="100" x2="350" y2="700" stroke="#ddd" stroke-width="1"/><line x1="410" y1="100" x2="410" y2="700" stroke="#ddd" stroke-width="1"/><line x1="470" y1="100" x2="470" y2="700" stroke="#ddd" stroke-width="1"/><line x1="530" y1="100" x2="530" y2="700" stroke="#ddd" stroke-width="1"/><line x1="590" y1="100" x2="590" y2="700" stroke="#ddd" stroke-width="1"/><line x1="650" y1="100" x2="650" y2="700" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="100" x2="650" y2="100" stroke="#ddd" stroke-width="1"/><line x1="50" y1="160" x2="650" y2="160" stroke="#ddd" stroke-width="1"/><line x1="50" y1="220" x2="650" y2="220" stroke="#ddd" stroke-width="1"/><line x1="50" y1="280" x2="650" y2="280" stroke="#ddd" stroke-width="1"/><line x1="50" y1="340" x2="650" y2="340" stroke="#ddd" stroke-width="1"/><line x1="50" y1="400" x2="650" y2="400" stroke="#ddd" stroke-width="1"/><line x1="50" y1="460" x2="650" y2="460" stroke="#ddd" stroke-width="1"/><line x1="50" y1="520" x2="650" y2="520" stroke="#ddd" stroke-width="1"/><line x1="50" y1="580" x2="650" y2="580" stroke="#ddd" stroke-width="1"/><line x1="50" y1="640" x2="650" y2="640" stroke="#ddd" stroke-width="1"/><line x1="50" y1="700" x2="650" y2="700" stroke="#ddd" stroke-width="1"/>
  
  <!-- Ships placed -->
  <rect x="110" y="160" width="180" height="60" fill="#4CAF50" stroke="#333" stroke-width="2" opacity="0.7"/>
  <text x="200" y="200" font-size="12" text-anchor="middle" fill="white">Submarine (3)</text>
  
  <rect x="350" y="280" width="120" height="60" fill="#2196F3" stroke="#333" stroke-width="2" opacity="0.7"/>
  <text x="410" y="315" font-size="12" text-anchor="middle" fill="white">Destroyer (2)</text>
  
  <rect x="170" y="400" width="60" height="60" fill="#FF9800" stroke="#333" stroke-width="2" opacity="0.7"/>
  <text x="200" y="435" font-size="10" text-anchor="middle" fill="white">Cruiser (1)</text>
  
  <!-- Ship legend on right -->
  <text x="750" y="150" font-size="16" font-weight="bold">Ships to Deploy:</text>
  <rect x="750" y="180" width="120" height="40" fill="#4CAF50" opacity="0.7"/>
  <text x="810" y="210" font-size="12" text-anchor="middle" fill="white">Submarine (3)</text>
  
  <rect x="750" y="240" width="80" height="40" fill="#2196F3" opacity="0.7"/>
  <text x="790" y="270" font-size="12" text-anchor="middle" fill="white">Destroyer (2)</text>
  
  <rect x="750" y="300" width="40" height="40" fill="#FF9800" opacity="0.7"/>
  <text x="770" y="330" font-size="11" text-anchor="middle" fill="white">Cruiser</text>
  
  <rect x="750" y="380" width="240" height="50" fill="#003366" stroke="#003366" stroke-width="2" rx="4"/>
  <text x="870" y="415" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Ready to Battle</text>

  </g>
</svg>