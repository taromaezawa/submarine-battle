<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="800" fill="#f5f5f5"/>
  
  <!-- Title bar -->
  <rect width="1280" height="60" fill="#003366"/>
  <text x="640" y="40" font-size="24" font-weight="bold" fill="white" text-anchor="middle">⚓ submarine-battle</text>
  
  <!-- Content -->
  <g id="content">
    
  <!-- Your Fleet (left) -->
  <text x="175" y="80" font-size="18" font-weight="bold" text-anchor="middle">Your Fleet</text>
  <rect x="50" y="100" width="250" height="250" fill="white" stroke="#333" stroke-width="2"/>
  
  <line x1="50" y1="100" x2="50" y2="350" stroke="#ddd" stroke-width="1"/><line x1="100" y1="100" x2="100" y2="350" stroke="#ddd" stroke-width="1"/><line x1="150" y1="100" x2="150" y2="350" stroke="#ddd" stroke-width="1"/><line x1="200" y1="100" x2="200" y2="350" stroke="#ddd" stroke-width="1"/><line x1="250" y1="100" x2="250" y2="350" stroke="#ddd" stroke-width="1"/><line x1="300" y1="100" x2="300" y2="350" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="100" x2="300" y2="100" stroke="#ddd" stroke-width="1"/><line x1="50" y1="150" x2="300" y2="150" stroke="#ddd" stroke-width="1"/><line x1="50" y1="200" x2="300" y2="200" stroke="#ddd" stroke-width="1"/><line x1="50" y1="250" x2="300" y2="250" stroke="#ddd" stroke-width="1"/><line x1="50" y1="300" x2="300" y2="300" stroke="#ddd" stroke-width="1"/><line x1="50" y1="350" x2="300" y2="350" stroke="#ddd" stroke-width="1"/>
  
  <!-- Ships in your fleet (visible) -->
  <rect x="80" y="130" width="40" height="40" fill="#4CAF50" stroke="#333" stroke-width="1"/>
  <rect x="130" y="130" width="40" height="40" fill="#4CAF50" stroke="#333" stroke-width="1"/>
  <rect x="80" y="180" width="40" height="40" fill="#2196F3" stroke="#333" stroke-width="1"/>
  
  <!-- Hits on your fleet (red) -->
  <circle cx="200" cy="210" r="15" fill="#F44336" stroke="#333" stroke-width="1"/>
  <circle cx="200" cy="260" r="15" fill="#F44336" stroke="#333" stroke-width="1"/>
  
  <!-- Enemy Fleet (right) -->
  <text x="955" y="80" font-size="18" font-weight="bold" text-anchor="middle">Enemy Fleet</text>
  <rect x="830" y="100" width="250" height="250" fill="white" stroke="#333" stroke-width="2"/>
  
  <line x1="830" y1="100" x2="830" y2="350" stroke="#ddd" stroke-width="1"/><line x1="880" y1="100" x2="880" y2="350" stroke="#ddd" stroke-width="1"/><line x1="930" y1="100" x2="930" y2="350" stroke="#ddd" stroke-width="1"/><line x1="980" y1="100" x2="980" y2="350" stroke="#ddd" stroke-width="1"/><line x1="1030" y1="100" x2="1030" y2="350" stroke="#ddd" stroke-width="1"/><line x1="1080" y1="100" x2="1080" y2="350" stroke="#ddd" stroke-width="1"/>
  <line x1="830" y1="100" x2="1080" y2="100" stroke="#ddd" stroke-width="1"/><line x1="830" y1="150" x2="1080" y2="150" stroke="#ddd" stroke-width="1"/><line x1="830" y1="200" x2="1080" y2="200" stroke="#ddd" stroke-width="1"/><line x1="830" y1="250" x2="1080" y2="250" stroke="#ddd" stroke-width="1"/><line x1="830" y1="300" x2="1080" y2="300" stroke="#ddd" stroke-width="1"/><line x1="830" y1="350" x2="1080" y2="350" stroke="#ddd" stroke-width="1"/>
  
  <!-- Hits (red) and misses (blue) on enemy grid -->
  <circle cx="900" cy="150" r="15" fill="#F44336" stroke="#333" stroke-width="1"/>
  <circle cx="950" cy="180" r="15" fill="#2196F3" stroke="#333" stroke-width="1"/>
  <circle cx="900" cy="230" r="15" fill="#F44336" stroke="#333" stroke-width="1"/>
  <circle cx="1000" cy="280" r="15" fill="#2196F3" stroke="#333" stroke-width="1"/>
  <circle cx="950" cy="300" r="15" fill="#F44336" stroke="#333" stroke-width="1"/>
  
  <!-- Game status -->
  <rect x="50" y="400" width="1020" height="80" fill="#f9f9f9" stroke="#999" stroke-width="1" rx="4"/>
  <text x="60" y="430" font-size="16" font-weight="bold">Your Turn</text>
  <text x="60" y="455" font-size="14">Click a cell on the enemy grid to attack</text>
  <text x="60" y="475" font-size="14">⏱ Time remaining: 28 seconds</text>

  </g>
</svg>